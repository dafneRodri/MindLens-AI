<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MindLens AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <!-- Panel izquierdo -->

        <div class="col-lg-6 left-panel">

            <div>

                <h1>🧠 MindLens AI</h1>

                <h3>Sistema Inteligente para el Bienestar Universitario</h3>

                <p>

                    Plataforma para el monitoreo, seguimiento y apoyo
                    al bienestar de los estudiantes mediante Inteligencia Artificial.

                </p>

            </div>

        </div>

        <!-- Panel derecho -->

        <div class="col-lg-6 d-flex justify-content-center align-items-center">

            <div class="login-card">

                <h2>Bienvenido</h2>

                <p>Acceso Institucional</p>

                <form>

                    <div class="mb-3">

                        <label>ID Institucional</label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-person-fill"></i>

                            </span>

                            <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Ingrese su ID">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>Contraseña</label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-lock-fill"></i>

                            </span>

                            <input
                                    type="password"
                                    class="form-control"
                                    placeholder="Ingrese su contraseña">

                        </div>

                    </div>

                    <button class="btn btn-primary w-100">

                        Acceso Institucional

                    </button>

                </form>

                <div class="links">

                    <a href="#">¿Olvidaste tu contraseña?</a>

                    <a href="#">Soporte TI</a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
